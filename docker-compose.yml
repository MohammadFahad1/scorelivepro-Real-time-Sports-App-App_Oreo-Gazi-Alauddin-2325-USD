services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app:z
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - DATABASE=postgres
      - SQL_HOST=db
      - SQL_PORT=5432
      - RUN_MIGRATIONS=true
    depends_on:
      - db
      - redis
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - .git
            - __pycache__
            - .venv
            - .idea
            - .vscode
        - action: rebuild
          path: requirements.txt

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=scorelivepro
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine

  celery:
    build: .
    command: celery -A config worker -l info
    volumes:
      - .:/app:z
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - DATABASE=postgres
      - SQL_HOST=db
      - SQL_PORT=5432
      - RUN_MIGRATIONS=false
    depends_on:
      - db
      - redis
    develop:
      watch:
        - action: sync+restart  # Celery needs a restart to pick up new task code
          path: .
          target: /app
          ignore:
            - .git
            - __pycache__
            - .venv
        - action: rebuild
          path: requirements.txt

  celery-beat:
    build: .
    command: celery -A config beat -l info -s /tmp/celerybeat-schedule
    volumes:
      - .:/app:z
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - DATABASE=postgres
      - SQL_HOST=db
      - SQL_PORT=5432
      - RUN_MIGRATIONS=false
    depends_on:
      - db
      - redis
    develop:
      watch:
        - action: sync+restart
          path: .
          target: /app
          ignore:
            - .git
            - __pycache__
            - .venv
        - action: rebuild
          path: requirements.txt

volumes:
  postgres_data: