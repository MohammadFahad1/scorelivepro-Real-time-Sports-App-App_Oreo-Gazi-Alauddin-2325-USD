upstream scorelivepro_web {
    server web:8000;
}

upstream scorelivepro_asgi {
    server asgi:8001;
}

server {
    listen 80;
    server_name api.scorelivepro.it;

    # Allow large uploads
    client_max_body_size 20M;

    # --- WEBSOCKET ROUTING ---
    location /ws/ {
        proxy_pass http://scorelivepro_asgi;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Passes the protocol (https) from the central proxy down to ASGI
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        # Pass custom device header
        proxy_set_header X-Device-ID $http_x_device_id; 

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://scorelivepro_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Crucial for Django to know the outside connection is HTTPS
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_redirect off;
    }

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/mediafiles/;
    }
}