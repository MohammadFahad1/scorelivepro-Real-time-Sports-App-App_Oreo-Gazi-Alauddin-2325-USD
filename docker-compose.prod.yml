services:
  web:
    image: itzwasik/scorelivepro-web:latest
    command: sh -c "python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --log-level debug"
    expose:
      - 8000
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - DATABASE=postgres
      - SQL_HOST=db
      - SQL_PORT=5432
      - RUN_MIGRATIONS=true
    depends_on:
      - db
      - redis
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro

  asgi:
    image: itzwasik/scorelivepro-web:latest
    command: daphne -b 0.0.0.0 -p 8001 config.asgi:application
    expose:
      - 8001
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - DATABASE=postgres
      - SQL_HOST=db
      - SQL_PORT=5432
    depends_on:
      - db
      - redis
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro

  nginx:
    image: nginx:1.25-alpine
    restart: always
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8100:80"
    depends_on:
      - web
      - asgi
      
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env

  redis:
    image: redis:7-alpine

  celery:
    image: itzwasik/scorelivepro-web:latest
    command: celery -A config worker -l info
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - DATABASE=postgres
      - SQL_HOST=db
      - SQL_PORT=5432
    depends_on:
      - db
      - redis
    volumes:
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro

  celery-beat:
    image: itzwasik/scorelivepro-web:latest
    command: celery -A config beat -l info -s /tmp/celerybeat-schedule
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - DATABASE=postgres
      - SQL_HOST=db
      - SQL_PORT=5432
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  static_volume:
  media_volume: